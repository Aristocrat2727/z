<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Lite</title>

<style>
body{margin:0;background:#0e1621;color:white;font-family:system-ui;display:flex;height:100vh}
#auth{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#app{display:none;width:100%;display:flex}
#sidebar{width:280px;background:#17212b;overflow:auto}
.chatItem{padding:10px;border-bottom:1px solid #0f2433;cursor:pointer}
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
.msg{padding:8px;margin:5px;border-radius:10px;max-width:60%}
.my{background:#2b5278;margin-left:auto}
.other{background:#1f2c38}
.meta{font-size:10px;opacity:.6}
.reply{font-size:11px;color:#aaa;border-left:2px solid #888;padding-left:5px;margin-bottom:4px}
input,button{padding:10px;border:none;border-radius:20px;margin:5px}
button{background:#2b5278;color:white}
</style>
</head>

<body>

<div id="auth">
  <input id="username" placeholder="username">
  <button id="login">Login / Register</button>
</div>

<div id="app">
  <div id="sidebar">
    <input id="findUser" placeholder="Start chat username">
    <button id="startChat">Start Chat</button>
    <div id="chats"></div>
  </div>

  <div id="chat">
    <div id="header">Select chat</div>
    <div id="messages"></div>
    <div id="replying"></div>
    <div style="display:flex">
      <input id="msg">
      <button id="send">Send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, onSnapshot, orderBy, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSy...",
 authDomain:"nita-3d3ca.firebaseapp.com",
 projectId:"nita-3d3ca",
 appId:"1:33599925674:web:6333e275daed0c053c0fd3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let me=null, currentChat=null, reply=null;

await signInAnonymously(auth);

// LOGIN / REGISTER
login.onclick=async()=>{
 const name=username.value.trim();
 if(!/^[a-zA-Z0-9]+$/.test(name)) return alert("ENG only");

 const q=query(collection(db,"users"),where("username","==",name));
 const snap=await getDocs(q);

 if(snap.empty){
   await setDoc(doc(db,"users",auth.currentUser.uid),{
     username:name,
     chats:[]
   });
   me={uid:auth.currentUser.uid,username:name};
 }else{
   me={uid:snap.docs[0].id,username:name};
 }

 authDiv.style.display="none";
 app.style.display="flex";
 loadChats();
};

// LOAD CHATS
async function loadChats(){
 const user=await getDoc(doc(db,"users",me.uid));
 const list=user.data().chats||[];

 chats.innerHTML="";
 for(let id of list){
   const c=await getDoc(doc(db,"chats",id));
   const data=c.data();
   const div=document.createElement("div");
   div.className="chatItem";
   div.innerText=data.name;
   div.onclick=()=>openChat(id,data.name);
   chats.appendChild(div);
 }
}

// START CHAT
startChat.onclick=async()=>{
 const name=findUser.value.trim();

 const q=query(collection(db,"users"),where("username","==",name));
 const snap=await getDocs(q);
 if(snap.empty) return alert("not found");

 const other=snap.docs[0].id;
 const id=[me.uid,other].sort().join("_");

 const ref=doc(db,"chats",id);
 if(!(await getDoc(ref)).exists()){
   await setDoc(ref,{name:name,members:[me.uid,other]});
   await updateDoc(doc(db,"users",me.uid),{chats:arrayUnion(id)});
   await updateDoc(doc(db,"users",other),{chats:arrayUnion(id)});
 }

 loadChats();
};

// OPEN CHAT
function openChat(id,name){
 currentChat=id;
 header.innerText=name;

 const q=query(collection(db,"chats",id,"messages"),orderBy("time"));
 onSnapshot(q,snap=>{
   messages.innerHTML="";
   snap.forEach(m=>{
     const d=m.data();
     const div=document.createElement("div");
     div.className="msg "+(d.sender===me.uid?"my":"other");

     div.innerHTML=`
       ${d.reply?`<div class='reply'>${d.reply}</div>`:""}
       ${d.text}
       <div class='meta'>${d.sender===me.uid?(d.read?"✓✓":"✓"):""}</div>
     `;

     div.onclick=()=>{reply=d.text; replying.innerText="Reply: "+d.text};

     if(d.sender!==me.uid && !d.read){
       updateDoc(m.ref,{read:true});
     }

     messages.appendChild(div);
   });

   messages.scrollTop=messages.scrollHeight;
 });
}

// SEND
msg.onkeydown=e=>{
 if(e.key==="Enter"){
   e.preventDefault();
   send.click();
 }
};

send.onclick=async()=>{
 if(!currentChat) return;
 if(!msg.value.trim()) return;

 await addDoc(collection(db,"chats",currentChat,"messages"),{
   text:msg.value,
   sender:me.uid,
   time:Date.now(),
   read:false,
   reply:reply||null
 });

 msg.value="";
 reply=null;
 replying.innerText="";
};
</script>

</body>
</html>
